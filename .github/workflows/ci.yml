name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: Gate (build.py -t)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build + host tests + nRF cross-build
        run: ./build.py -t

  smoke:
    name: Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [host, nrf]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Host smoke
        if: matrix.target == 'host'
        run: ./build.py --host-only -t

      - name: nRF smoke
        if: matrix.target == 'nrf'
        run: ./build.py --nrf-only

      - name: Package nRF artifacts
        if: matrix.target == 'nrf'
        run: |
          mkdir -p artifacts/nrf
          cp build/nrf/nrf52_blinky artifacts/nrf/
          cp build/nrf/nrf52_mocap_node artifacts/nrf/
          nix develop --command bash -lc "arm-none-eabi-objcopy -O ihex build/nrf/nrf52_blinky artifacts/nrf/nrf52_blinky.hex"
          nix develop --command bash -lc "arm-none-eabi-objcopy -O ihex build/nrf/nrf52_mocap_node artifacts/nrf/nrf52_mocap_node.hex"

      - name: Upload nRF artifacts
        if: matrix.target == 'nrf'
        uses: actions/upload-artifact@v4
        with:
          name: nrf-smoke-binaries
          path: artifacts/nrf/
