CONFIG_HELIX_MOCAP_BRIDGE_ROLE_NODE=y
CONFIG_HELIX_MOCAP_BRIDGE_ROLE_CENTRAL=n

# C++ support for OTA modules
CONFIG_CPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_STD_CPP17=y

# Flash + MCUboot for OTA
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_STREAM_FLASH=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="4.0.0+0"
CONFIG_REBOOT=y

# BLE for OTA boot window
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="HTag"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=16
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_GATT_DYNAMIC_DB=n
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_PHY_2M=y
# Extra ACL RX headroom for OTA data bursts from the Hub
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=6

# ESB must use dynamic interrupts so radio can be released for BLE
CONFIG_ESB_DYNAMIC_INTERRUPTS=y

# MPSL dynamic interrupts + BLE uninit: allows bt_disable() to fully
# release TIMER0/RTC0/RADIO so ESB can claim them after the OTA window.
# Without these, bt_disable() leaves MPSL IRQ handlers active and
# esb_init() causes a HardFault trying to install its own handlers.
CONFIG_MPSL_DYNAMIC_INTERRUPTS=y
CONFIG_BT_UNINIT_MPSL_ON_DISABLE=y
CONFIG_BT_LL_SOFTDEVICE=y

# Stack/heap for BLE + ESB + C++
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# BLE OTA window must exceed the OTA transfer duration:
# direct BLE ~3 min, Hub relay ~46s. 300s gives plenty of headroom.
CONFIG_HELIX_OTA_BOOT_WINDOW_MS=300000
