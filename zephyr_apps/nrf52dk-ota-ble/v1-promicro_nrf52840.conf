CONFIG_HELIX_OTA_LABEL="ota-pico-v1"
CONFIG_BT_DEVICE_NAME="HelixPico-v1"
CONFIG_MCUBOOT_IMGTOOL_SIGN_VERSION="1.0.0+0"
# Board ID 0x52840070 allocated for promicro_nrf52840.
CONFIG_HELIX_OTA_TARGET_ID=0x52840070

# Disable the board-default USB CDC ACM serial backend.
# Console output goes through physical UART (P0.09/P0.10) instead.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n

# Use deferred logging so log output does not block BLE callbacks.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_MODE_IMMEDIATE=n

# ProPico uses MCUboot directly, no Nordic SoftDevice MBR.
CONFIG_BOARD_HAS_NRF5_BOOTLOADER=n

# Enable interrupt-driven UART for the deferred log backend.
CONFIG_UART_INTERRUPT_DRIVEN=y
