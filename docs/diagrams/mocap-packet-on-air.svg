<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 110" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <!-- Packet fields -->
  <rect x="10" y="10" width="90" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="55" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">0xAA</text>
  <text x="55" y="42" text-anchor="middle" font-size="10" fill="#555">Preamble</text>
  <text x="55" y="55" text-anchor="middle" font-size="9" fill="#777">1 byte</text>

  <rect x="110" y="10" width="160" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="190" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">E7 A1 B2 C1 D3</text>
  <text x="190" y="42" text-anchor="middle" font-size="10" fill="#555">Address (Pipe 0)</text>
  <text x="190" y="55" text-anchor="middle" font-size="9" fill="#777">5 bytes</text>

  <rect x="280" y="10" width="150" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="355" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="11">L=24, PID, NoACK=0</text>
  <text x="355" y="42" text-anchor="middle" font-size="10" fill="#555">PCF</text>
  <text x="355" y="55" text-anchor="middle" font-size="9" fill="#777">9 bits</text>

  <rect x="440" y="10" width="220" height="55" rx="4" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="550" y="28" text-anchor="middle" font-weight="bold" fill="white" font-size="13">Mocap Frame</text>
  <text x="550" y="42" text-anchor="middle" font-size="10" fill="#E8F5E9">Payload (see Ch. 5)</text>
  <text x="550" y="55" text-anchor="middle" font-size="9" fill="#C8E6C9">24 bytes</text>

  <rect x="670" y="10" width="100" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="720" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">CRC-16</text>
  <text x="720" y="42" text-anchor="middle" font-size="10" fill="#555">Auto-computed</text>
  <text x="720" y="55" text-anchor="middle" font-size="9" fill="#777">2 bytes</text>

  <!-- Role annotations -->
  <line x1="10" y1="75" x2="430" y2="75" stroke="#bbb" stroke-width="0.5"/>
  <text x="220" y="88" text-anchor="middle" font-size="9" fill="#999">← Radio hardware handles these fields →</text>

  <line x1="440" y1="75" x2="660" y2="75" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="550" y="88" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="bold">← Firmware fills this →</text>

  <line x1="670" y1="75" x2="770" y2="75" stroke="#bbb" stroke-width="0.5"/>
  <text x="720" y="88" text-anchor="middle" font-size="9" fill="#999">← HW →</text>

  <!-- Total -->
  <text x="400" y="105" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Total: 34 bytes on the air for 24 bytes of useful data</text>
</svg>
