CONFIG_LOG=n
CONFIG_PRINTK=n

CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_UART_NRFX=n
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_UART_LINE_CTRL=n

CONFIG_GPIO=n
CONFIG_MCUBOOT_SERIAL=n
CONFIG_BOOT_SERIAL_CDC_ACM=n
CONFIG_BOOT_SERIAL_UART=n
CONFIG_BOOT_ECDSA_TINYCRYPT=y
CONFIG_BOOT_ECDSA_CC310=n
CONFIG_BOOT_SIGNATURE_USING_KMU=n

# ProPico requires multithreading in MCUboot: the RC clock driver uses
# k_sem internally, causing a fault with CONFIG_MULTITHREADING=n.
CONFIG_MULTITHREADING=y
CONFIG_LTO=n
# Peripheral cleanup disabled: the nrf_cleanup_peripheral() path causes
# HardFault on ProPico clones that lack the expected UARTE/GPIO layout.
CONFIG_MCUBOOT_NRF_CLEANUP_PERIPHERAL=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n

CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DEVICE_REMOTE_WAKEUP=n
CONFIG_USB_CDC_ACM=n
CONFIG_USBD_CDC_ACM_CLASS=n
