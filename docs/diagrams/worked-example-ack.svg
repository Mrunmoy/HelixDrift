<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 80" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <rect x="10" y="10" width="90" height="50" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="55" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">0xAA</text>
  <text x="55" y="46" text-anchor="middle" font-size="10" fill="#555">Preamble</text>

  <rect x="110" y="10" width="160" height="50" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="190" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">E7 A1 B2 C1 D3</text>
  <text x="190" y="46" text-anchor="middle" font-size="10" fill="#555">Address</text>

  <rect x="280" y="10" width="80" height="50" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="320" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">L=8</text>
  <text x="320" y="46" text-anchor="middle" font-size="10" fill="#555">PCF</text>

  <rect x="370" y="10" width="310" height="50" rx="4" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
  <text x="525" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" fill="white" font-size="12">A1 00 0F 4D 48 43 0F 00</text>
  <text x="525" y="46" text-anchor="middle" font-size="10" fill="#BBDEFB">Sync Anchor (8 bytes)</text>

  <rect x="690" y="10" width="90" height="50" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="735" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">xx xx</text>
  <text x="735" y="46" text-anchor="middle" font-size="10" fill="#555">CRC-16</text>

  <text x="410" y="75" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">16 bytes total on the air — the anchor rides free inside the ACK</text>
</svg>
