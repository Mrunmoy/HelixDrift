name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: Gate (host tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build + host tests
        run: ./build.py --host-only -t

  smoke:
    name: Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target: [host, esp32s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Host smoke
        if: matrix.target == 'host'
        run: ./build.py --host-only -t

      - name: ESP32-S3 smoke
        if: matrix.target == 'esp32s3'
        run: ./build.py --esp32s3-only

      - name: Package ESP32-S3 artifacts
        if: matrix.target == 'esp32s3'
        run: |
          mkdir -p artifacts/esp32s3
          cp build/esp32s3/esp32s3_mocap_node.bin artifacts/esp32s3/
          cp build/esp32s3/bootloader/bootloader.bin artifacts/esp32s3/
          cp build/esp32s3/partition_table/partition-table.bin artifacts/esp32s3/

      - name: Upload ESP32-S3 artifacts
        if: matrix.target == 'esp32s3'
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-smoke-binaries
          path: artifacts/esp32s3/
