name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (host)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify submodule SHAs are reachable on remote
        # Prevents the "stale submodule pointer" class of CI breakage — when
        # a superproject commit references a submodule commit that was only
        # local, the standard `git submodule update --init` fails obscurely
        # with "not our ref". Do an explicit `git fetch --depth=1 <url> <sha>`
        # for each submodule so the error is clear and actionable.
        #
        # Why not `git ls-remote`: that only enumerates ref tips (branches +
        # tags). A perfectly valid submodule pointer to a non-tip ancestor
        # commit would fail ls-remote while `git submodule update` would
        # succeed. `git fetch <sha>` is the only way to verify the exact
        # commit is reachable from the remote. (Codex review round 8.)
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          fail=0
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            sha=$(git ls-tree HEAD "$path" | awk '{print $3}')
            url=$(git config -f .gitmodules "submodule.$path.url")
            echo "Checking $path @ $sha on $url..."
            tmp=$(mktemp -d)
            (cd "$tmp" && git init -q && \
              git fetch --depth=1 "$url" "$sha" 2>/dev/null) && ok=1 || ok=0
            rm -rf "$tmp"
            if [ "$ok" -ne 1 ]; then
              echo "::error::Submodule $path references commit $sha which is not reachable on $url"
              echo "::error::Push the missing commits to the submodule remote before merging."
              fail=1
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          exit $fail

      - name: Configure host build
        run: |
          git submodule update --init external/SensorFusion
          nix develop --command bash -lc 'cmake -S . -B build/host -G Ninja -DHELIXDRIFT_BUILD_TESTS=ON -DHELIXDRIFT_BUILD_NRF_EXAMPLES=OFF'

      - name: Build host targets
        run: nix develop --command bash -lc 'cmake --build build/host --parallel'

      - name: Run unit test executable
        run: nix develop --command bash -lc './build/host/helix_tests'

  integration:
    name: Integration (host)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify submodule SHAs are reachable on remote
        # Prevents the "stale submodule pointer" class of CI breakage — when
        # a superproject commit references a submodule commit that was only
        # local, the standard `git submodule update --init` fails obscurely
        # with "not our ref". Do an explicit `git fetch --depth=1 <url> <sha>`
        # for each submodule so the error is clear and actionable.
        #
        # Why not `git ls-remote`: that only enumerates ref tips (branches +
        # tags). A perfectly valid submodule pointer to a non-tip ancestor
        # commit would fail ls-remote while `git submodule update` would
        # succeed. `git fetch <sha>` is the only way to verify the exact
        # commit is reachable from the remote. (Codex review round 8.)
        run: |
          set -euo pipefail
          git config --global --add safe.directory '*'
          fail=0
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            sha=$(git ls-tree HEAD "$path" | awk '{print $3}')
            url=$(git config -f .gitmodules "submodule.$path.url")
            echo "Checking $path @ $sha on $url..."
            tmp=$(mktemp -d)
            (cd "$tmp" && git init -q && \
              git fetch --depth=1 "$url" "$sha" 2>/dev/null) && ok=1 || ok=0
            rm -rf "$tmp"
            if [ "$ok" -ne 1 ]; then
              echo "::error::Submodule $path references commit $sha which is not reachable on $url"
              echo "::error::Push the missing commits to the submodule remote before merging."
              fail=1
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')
          exit $fail

      - name: Configure host build
        run: |
          git submodule update --init external/SensorFusion
          nix develop --command bash -lc 'cmake -S . -B build/host -G Ninja -DHELIXDRIFT_BUILD_TESTS=ON -DHELIXDRIFT_BUILD_NRF_EXAMPLES=OFF'

      - name: Build host targets
        run: nix develop --command bash -lc 'cmake --build build/host --parallel'

      - name: Run integration test executable
        run: nix develop --command bash -lc './build/host/helix_integration_tests'

  nrf-smoke:
    name: nRF Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build nRF target
        run: ./build.py --nrf-only

      - name: Install imgtool (for signing)
        run: pip install imgtool

      - name: Sign nRF application image
        run: |
          nix develop --command bash -lc \
            "arm-none-eabi-objcopy -O ihex build/nrf/nrf52_mocap_node build/nrf/nrf52_mocap_node.hex"
          ./scripts/sign_firmware.sh \
            build/nrf/nrf52_mocap_node.hex \
            keys/dev_signing_key.pem \
            "1.0.0+${GITHUB_RUN_NUMBER:-0}" \
            build/nrf/nrf52_mocap_node_signed.hex

      - name: Package nRF artifacts
        run: |
          mkdir -p artifacts/nrf
          cp build/nrf/nrf52_blinky artifacts/nrf/
          cp build/nrf/nrf52_mocap_node artifacts/nrf/
          cp build/nrf/nrf52_mocap_node_signed.hex artifacts/nrf/
          nix develop --command bash -lc "arm-none-eabi-objcopy -O ihex build/nrf/nrf52_blinky artifacts/nrf/nrf52_blinky.hex"
          nix develop --command bash -lc "arm-none-eabi-objcopy -O ihex build/nrf/nrf52_mocap_node artifacts/nrf/nrf52_mocap_node.hex"

      - name: Upload nRF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrf-smoke-binaries
          path: artifacts/nrf/
