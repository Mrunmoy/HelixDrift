CONFIG_HELIX_MOCAP_BRIDGE_ROLE_CENTRAL=y
CONFIG_HELIX_MOCAP_BRIDGE_ROLE_NODE=n

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_ERR=y

# C++ support for OTA relay modules
CONFIG_CPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_STD_CPP17=y

# BLE central for OTA relay to Tags
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
# Auto-exchange ATT MTU on connect. Without this, MTU stays at the spec
# default of 23 bytes and bt_gatt_write() for payloads > 20 B (e.g. our
# 132 B OTA data chunks) falls back to Prepare/Execute Write, which the
# Tag's OTA data characteristic rejects with BT_ATT_ERR_NOT_SUPPORTED (0x06).
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
CONFIG_BT_DEVICE_NAME="HHub"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=16
CONFIG_BT_MAX_CONN=1
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_PHY_2M=y

# Suppress BLE log spam during relay (prevents TX buffer overflow)
CONFIG_BT_LOG_LEVEL_ERR=y
CONFIG_BT_HCI_CORE_LOG_LEVEL_ERR=y

# ESB+BLE coexistence: same pattern as Tags
CONFIG_ESB_DYNAMIC_INTERRUPTS=y

# Force FIFO depth 1 (experiment 2026-04-23): the default ESB_TX_FIFO_SIZE=8
# lets Hub queue up to 8 anchors deep. Combined with asymmetric FIFO drain
# on slow-path ACK transmission, that drives a ~10ms bias in the Stage 3
# midpoint estimator (see docs/RF_V20_FINDINGS.md). Depth 1 forces only ONE
# in-flight anchor at a time; if Hub misses the TIFS window, the anchor is
# simply not queued (rather than piling up in FIFO). The Stage 2 rx_node_id
# filter should absorb the resulting "empty ACK" cases on Tags.
CONFIG_ESB_TX_FIFO_SIZE=1
CONFIG_MPSL_DYNAMIC_INTERRUPTS=y
CONFIG_BT_UNINIT_MPSL_ON_DISABLE=y
CONFIG_BT_LL_SOFTDEVICE=y

# USB CDC RX for receiving OTA commands from PC
CONFIG_UART_INTERRUPT_DRIVEN=y

# Stack/heap for BLE + ESB + C++ + USB
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_REBOOT=y
