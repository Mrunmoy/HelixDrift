<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 90" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <!-- Packet fields -->
  <rect x="10" y="10" width="90" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="55" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">0xAA</text>
  <text x="55" y="42" text-anchor="middle" font-size="10" fill="#555">Preamble</text>
  <text x="55" y="55" text-anchor="middle" font-size="9" fill="#777">1 byte</text>

  <rect x="110" y="10" width="160" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="190" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">E7 A1 B2 C1 D3</text>
  <text x="190" y="42" text-anchor="middle" font-size="10" fill="#555">Address (Pipe 0)</text>
  <text x="190" y="55" text-anchor="middle" font-size="9" fill="#777">5 bytes</text>

  <rect x="280" y="10" width="140" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="350" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="11">L=8, PID, NoACK=0</text>
  <text x="350" y="42" text-anchor="middle" font-size="10" fill="#555">PCF</text>
  <text x="350" y="55" text-anchor="middle" font-size="9" fill="#777">9 bits</text>

  <rect x="430" y="10" width="190" height="55" rx="4" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
  <text x="525" y="28" text-anchor="middle" font-weight="bold" fill="white" font-size="13">Sync Anchor</text>
  <text x="525" y="42" text-anchor="middle" font-size="10" fill="#BBDEFB">ACK Payload</text>
  <text x="525" y="55" text-anchor="middle" font-size="9" fill="#90CAF9">8 bytes</text>

  <rect x="630" y="10" width="100" height="55" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="680" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="12">CRC-16</text>
  <text x="680" y="42" text-anchor="middle" font-size="10" fill="#555">Auto-computed</text>
  <text x="680" y="55" text-anchor="middle" font-size="9" fill="#777">2 bytes</text>

  <!-- Legend -->
  <rect x="10" y="76" width="10" height="10" fill="#2196F3" rx="2"/>
  <text x="25" y="85" font-size="10" fill="#555">Blue = Hub's sync anchor data riding free inside the hardware ACK. Total: 16 bytes on the air.</text>
</svg>
