<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 90" font-family="'Segoe UI', Arial, sans-serif" font-size="13">
  <!-- Channel boxes -->
  <rect x="10" y="10" width="90" height="40" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="55" y="30" text-anchor="middle" font-weight="bold" font-size="13">Ch 0</text>
  <text x="55" y="46" text-anchor="middle" font-size="9" fill="#555">2.400 GHz</text>

  <rect x="110" y="10" width="70" height="40" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="145" y="34" text-anchor="middle" font-size="13">Ch 1</text>

  <text x="215" y="34" text-anchor="middle" font-size="16" fill="#888">···</text>

  <rect x="250" y="10" width="70" height="40" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="285" y="34" text-anchor="middle" font-size="13">Ch 39</text>

  <!-- Highlighted Ch 40 -->
  <rect x="330" y="5" width="100" height="50" rx="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="380" y="28" text-anchor="middle" font-weight="bold" font-size="14" fill="white">Ch 40</text>
  <text x="380" y="44" text-anchor="middle" font-size="9" fill="#E8F5E9">2.440 GHz</text>

  <rect x="440" y="10" width="70" height="40" rx="4" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="475" y="34" text-anchor="middle" font-size="13">Ch 41</text>

  <text x="545" y="34" text-anchor="middle" font-size="16" fill="#888">···</text>

  <rect x="580" y="10" width="100" height="40" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="630" y="30" text-anchor="middle" font-weight="bold" font-size="13">Ch 100</text>
  <text x="630" y="46" text-anchor="middle" font-size="9" fill="#555">2.4835 GHz</text>

  <!-- Arrow pointing to Ch 40 -->
  <line x1="380" y1="60" x2="380" y2="72" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="374,72 380,82 386,72" fill="#2E7D32"/>
  <text x="380" y="60" text-anchor="middle" font-size="10" fill="#2E7D32" transform="translate(0,-65)">▼ We transmit here</text>

  <!-- Band labels -->
  <text x="10" y="82" font-size="9" fill="#888">2.400 GHz</text>
  <text x="680" y="82" font-size="9" fill="#888" text-anchor="end">2.4835 GHz</text>
  <line x1="10" y1="74" x2="680" y2="74" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,3"/>
</svg>
